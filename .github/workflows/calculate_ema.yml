name: Calculate EMA Scores

on:
  schedule:
    - cron: '30 11 * * *'  # Runs daily at 5:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas

      - name: Calculate EMA scores
        run: |
          python calculate_ema.py

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all result files
          git add data/results.json data/ema_results.csv data/ema_results_detailed.json
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update EMA calculations [skip ci]"
            git push origin main
          fi
