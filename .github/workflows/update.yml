name: Update EMA Scanner

on:
  schedule:
    # 5:00 PM IST = 11:30 UTC (IST is UTC+5:30)
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          if [ -f scanner/requirements.txt ]; then
            pip install -r scanner/requirements.txt
          else
            echo "⚠️ scanner/requirements.txt not found, installing pandas"
            pip install pandas
          fi

      - name: Run EMA Scanner
        run: python scanner/scanner.py

      - name: Commit Updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes to avoid conflicts
          git pull origin main --rebase || true
          
          # Add all changes
          git add data/results.json
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update EMA scanner data [skip ci]"
            git push origin main
          fi
